name: Publish SDK to GitHub Packages

# Publie le paquet lorsqu'une Release GitHub est publiée (recommandé), ou
# manuellement via l'onglet Actions.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@chaireblockchainulaval'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          # Fourni automatiquement par GitHub Actions ; a le droit packages:write
          # grâce au bloc permissions ci-dessus.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
